zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 9a878bd3f23b47e09a4409359f406a99
      name: 'Templates/Network devices'
  host_groups:
    - uuid: b61473fd21ae4774a751b4773d907877
      name: 'NSX-T'
  templates:
    - uuid: 06086087126f4a948a15d37b78e317c6
      template: 'NSX-T by Prometheus exporter'
      name: 'NSX-T by Prometheus exporter'
      description: |
        VMware NSX-T 4.2 monitoring via the adaptera/zabbix-nsx-t-exporter (a fork of
        sapcc/nsx-t-exporter with extended collectors). The template scrapes the
        exporter's /metrics endpoint once per interval and fans the result out to
        dependent items and LLD rules.

        Covers the 9 operational scenarios:
          1. Manager cluster down/degraded
          2. Edge node down
          3. Transport node disconnected
          4. High CPU/Memory on Edge or Manager
          5. Geneve/TEP tunnel down
          6. BGP neighbor down
          7. IP/TEP pool exhaustion
          8. Certificate expiration
          9. Backup failure

        Plus Load Balancer service/VS/pool/member status and counters.
      groups:
        - name: 'Templates/Network devices'
      macros:
        - macro: '{$NSXT.EXPORTER.URL}'
          value: 'http://localhost:9999'
          description: 'Base URL of the NSX-T Prometheus exporter (no trailing slash)'
        - macro: '{$NSXT.EXPORTER.USER}'
          value: ''
          description: 'Optional Basic-Auth user for the exporter'
        - macro: '{$NSXT.EXPORTER.PASSWORD}'
          value: ''
          description: 'Optional Basic-Auth password for the exporter'
        - macro: '{$NSXT.CPU.WARN}'
          value: '0.8'
          description: 'CPU pressure ratio for manager/edge warning trigger (1-min load_avg / cpu_cores)'
        - macro: '{$NSXT.MEM.WARN}'
          value: '0.9'
          description: 'Memory usage ratio for manager/edge warning trigger'
        - macro: '{$NSXT.DISK.WARN}'
          value: '0.85'
          description: 'Filesystem usage ratio for warning trigger'
        - macro: '{$NSXT.IP_POOL.WARN}'
          value: '0.85'
          description: 'IP pool usage ratio at which to fire the capacity warning'
        - macro: '{$NSXT.CERT.WARN.DAYS}'
          value: '30'
          description: 'Certificate expiry warning threshold, in days'
        - macro: '{$NSXT.CERT.CRIT.DAYS}'
          value: '7'
          description: 'Certificate expiry critical threshold, in days'
        - macro: '{$NSXT.BACKUP.STALE.HOURS}'
          value: '36'
          description: 'Hours since last successful cluster backup before alerting'
        - macro: '{$NSXT.NO_FETCH.SECONDS}'
          value: '600'
          description: 'Seconds since last successful exporter data fetch before alerting'

      items:
        - uuid: 92e3f0d7bfc749cf9a08f8883f28bfb5
          name: 'NSX-T: Get metrics'
          type: HTTP_AGENT
          key: 'nsxt.get'
          url: '{$NSXT.EXPORTER.URL}/metrics'
          delay: 1m
          history: '0'
          trends: '0'
          value_type: TEXT
          timeout: 30s
          authtype: BASIC
          username: '{$NSXT.EXPORTER.USER}'
          password: '{$NSXT.EXPORTER.PASSWORD}'
          description: 'Master item that scrapes the NSX-T Prometheus exporter. All other items derive from this.'

        - uuid: 6772ec3cdd1944b8a071bf7e47a82a60
          name: 'NSX-T: Manager cluster management status'
          type: DEPENDENT
          key: nsxt.cluster.management.status
          master_item:
            key: nsxt.get
          delay: '0'
          value_type: FLOAT
          description: 'STABLE=1, INITIALIZING=0, UNSTABLE=-1, DEGRADED=-2, UNKNOWN=-3'
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - 'nsxv3_cluster_management_status'
                - value
                - ''
          triggers:
            - uuid: b580a6abcb9d412589a4f91d9699a1d9
              expression: 'last(/NSX-T by Prometheus exporter/nsxt.cluster.management.status)<1'
              name: 'NSX-T: Manager cluster is degraded or down'
              priority: HIGH
              description: 'NSX-T management cluster reports a state below STABLE. Operational scenario #1.'
              manual_close: 'YES'

        - uuid: a0a17cb4ddb14b9eaa23a2f2494d59c8
          name: 'NSX-T: Manager cluster control status'
          type: DEPENDENT
          key: nsxt.cluster.control.status
          master_item:
            key: nsxt.get
          delay: '0'
          value_type: FLOAT
          description: 'Control plane health - STABLE=1, NO_CONTROLLERS=0, UNSTABLE=-1, DEGRADED=-2, UNKNOWN=-3'
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - 'nsxv3_cluster_control_status'
                - value
                - ''
          triggers:
            - uuid: c3a4346226bf4d0f85d51a75f3dd4d06
              expression: 'last(/NSX-T by Prometheus exporter/nsxt.cluster.control.status)<1'
              name: 'NSX-T: Manager control plane is degraded'
              priority: HIGH

        - uuid: 85c021268d354c8ea5351d6115fe6a04
          name: 'NSX-T: Manager cluster online nodes'
          type: DEPENDENT
          key: nsxt.cluster.online_nodes
          master_item:
            key: nsxt.get
          delay: '0'
          value_type: FLOAT
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - 'nsxv3_cluster_management_online_nodes'
                - value
                - ''

        - uuid: d3ea9f644b6e480594e472c02ba117e8
          name: 'NSX-T: Manager cluster offline nodes'
          type: DEPENDENT
          key: nsxt.cluster.offline_nodes
          master_item:
            key: nsxt.get
          delay: '0'
          value_type: FLOAT
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - 'nsxv3_cluster_management_offline_nodes'
                - value
                - ''
          triggers:
            - uuid: aeabdc7019464864be962ed477e1b008
              expression: 'last(/NSX-T by Prometheus exporter/nsxt.cluster.offline_nodes)>0'
              name: 'NSX-T: Manager cluster has {ITEM.LASTVALUE} offline node(s)'
              priority: HIGH

        - uuid: 6c70bfa706ae4959a92ad3a5a3011f89
          name: 'NSX-T: Last successful exporter fetch'
          type: DEPENDENT
          key: nsxt.exporter.last_fetch
          master_item:
            key: nsxt.get
          delay: '0'
          value_type: FLOAT
          units: unixtime
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - 'nsxv3_cluster_management_last_successful_data_fetch'
                - value
                - ''
          triggers:
            - uuid: 809476af73d44842abde752aaf81d83e
              expression: '(now()-last(/NSX-T by Prometheus exporter/nsxt.exporter.last_fetch))>{$NSXT.NO_FETCH.SECONDS}'
              name: 'NSX-T: Exporter is not collecting fresh data'
              priority: AVERAGE
              description: 'The exporter has not successfully scraped NSX-T for {$NSXT.NO_FETCH.SECONDS}s. All other NSX-T alerts may be stale.'

        - uuid: 89cc124e8b074486bacd2e5b6ee1971f
          name: 'NSX-T: Cluster backup last success timestamp'
          type: DEPENDENT
          key: 'nsxt.backup.last_success[cluster]'
          master_item:
            key: nsxt.get
          delay: '0'
          value_type: FLOAT
          units: unixtime
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - 'nsxv3_backup_last_success_timestamp{type="cluster"}'
                - value
                - ''
          triggers:
            - uuid: 504df48aa426443c854b4ca27f5b3e93
              expression: '(now()-last(/NSX-T by Prometheus exporter/nsxt.backup.last_success[cluster]))>({$NSXT.BACKUP.STALE.HOURS}*3600)'
              name: 'NSX-T: Cluster backup has not succeeded for {$NSXT.BACKUP.STALE.HOURS}h'
              priority: HIGH
              description: 'Operational scenario #9: backup failure.'

        - uuid: 2a4559446ba2405ca07b6aaefae074be
          name: 'NSX-T: Cluster backup last attempt success'
          type: DEPENDENT
          key: 'nsxt.backup.last_attempt[cluster]'
          master_item:
            key: nsxt.get
          delay: '0'
          value_type: FLOAT
          description: '1=success, 0=failure, -1=no attempts recorded'
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - 'nsxv3_backup_last_attempt_success{type="cluster"}'
                - value
                - ''

        - uuid: 1bd0cf37addc4f33b6581330d472c6bd
          name: 'NSX-T: Cluster backup consecutive failures'
          type: DEPENDENT
          key: 'nsxt.backup.consecutive_failures[cluster]'
          master_item:
            key: nsxt.get
          delay: '0'
          value_type: FLOAT
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - 'nsxv3_backup_consecutive_failures{type="cluster"}'
                - value
                - ''
          triggers:
            - uuid: 8a8d4ed99c5f4974a8d02125dc359e2e
              expression: 'last(/NSX-T by Prometheus exporter/nsxt.backup.consecutive_failures[cluster])>=2'
              name: 'NSX-T: Cluster backup has failed {ITEM.LASTVALUE} times in a row'
              priority: HIGH

        - uuid: 9a0ef58abd254e19b981519096f36b7c
          name: 'NSX-T: Node backup consecutive failures'
          type: DEPENDENT
          key: 'nsxt.backup.consecutive_failures[node]'
          master_item:
            key: nsxt.get
          delay: '0'
          value_type: FLOAT
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - 'nsxv3_backup_consecutive_failures{type="node"}'
                - value
                - ''

        - uuid: 48dd3be8bced403d8c2f6cceb5737acf
          name: 'NSX-T: Inventory backup consecutive failures'
          type: DEPENDENT
          key: 'nsxt.backup.consecutive_failures[inventory]'
          master_item:
            key: nsxt.get
          delay: '0'
          value_type: FLOAT
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - 'nsxv3_backup_consecutive_failures{type="inventory"}'
                - value
                - ''

        - uuid: 2cb967c9486848108a3d3d11f4799796
          name: 'NSX-T: Transport nodes - up count'
          type: DEPENDENT
          key: nsxt.transport_nodes.up
          master_item:
            key: nsxt.get
          delay: '0'
          value_type: FLOAT
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - 'nsxv3_transport_nodes_up'
                - value
                - ''

        - uuid: a4e814c42871416c8a7b7a0bf2cadd2f
          name: 'NSX-T: Transport nodes - down count'
          type: DEPENDENT
          key: nsxt.transport_nodes.down
          master_item:
            key: nsxt.get
          delay: '0'
          value_type: FLOAT
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - 'nsxv3_transport_nodes_down'
                - value
                - ''

        - uuid: 86cc43d83e704606b62a3cda5d4151a2
          name: 'NSX-T: Transport nodes - degraded count'
          type: DEPENDENT
          key: nsxt.transport_nodes.degraded
          master_item:
            key: nsxt.get
          delay: '0'
          value_type: FLOAT
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - 'nsxv3_transport_nodes_degraded'
                - value
                - ''

      discovery_rules:

        # ─── Management nodes ─────────────────────────────────────────────
        - uuid: ff43b186dbc44d9e9cd04ae56616f685
          name: 'NSX-T: Management nodes discovery'
          type: DEPENDENT
          key: nsxt.management_nodes.discovery
          master_item:
            key: nsxt.get
          delay: '0'
          lifetime: 7d
          preprocessing:
            - type: PROMETHEUS_TO_JSON
              parameters:
                - 'nsxv3_management_node_connectivity'
          lld_macro_paths:
            - lld_macro: '{#NODE_IP}'
              path: '$.labels.nsxv3_node_ip'
          item_prototypes:
            - uuid: c0dd806050e0451caf091f600619105c
              name: 'Mgr {#NODE_IP}: CPU usage ratio (1-min load_avg / cores)'
              type: DEPENDENT
              key: 'nsxt.mgr.cpu_usage_ratio[{#NODE_IP}]'
              master_item:
                key: nsxt.get
              delay: '0'
              value_type: FLOAT
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'nsxv3_management_node_cpu_usage_ratio{nsxv3_node_ip="{#NODE_IP}"}'
                    - value
                    - ''
              trigger_prototypes:
                - uuid: 1b193d6b3c10443bb4b181818907a888
                  expression: 'last(/NSX-T by Prometheus exporter/nsxt.mgr.cpu_usage_ratio[{#NODE_IP}])>{$NSXT.CPU.WARN}'
                  name: 'NSX-T: Manager {#NODE_IP} CPU pressure high ({ITEM.LASTVALUE})'
                  priority: WARNING
                  description: 'Operational scenario #4: high CPU on manager.'
            - uuid: 503ea4e7388e4e0ea0df76be11b389e5
              name: 'Mgr {#NODE_IP}: Memory used (bytes)'
              type: DEPENDENT
              key: 'nsxt.mgr.memory_use[{#NODE_IP}]'
              master_item:
                key: nsxt.get
              delay: '0'
              value_type: FLOAT
              units: B
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'nsxv3_management_node_memory_use{nsxv3_node_ip="{#NODE_IP}"}'
                    - value
                    - ''
            - uuid: 552e0b8267dd4a27bfb68128f9dd3a7f
              name: 'Mgr {#NODE_IP}: Memory total (bytes)'
              type: DEPENDENT
              key: 'nsxt.mgr.memory_total[{#NODE_IP}]'
              master_item:
                key: nsxt.get
              delay: '0'
              value_type: FLOAT
              units: B
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'nsxv3_management_node_memory_total{nsxv3_node_ip="{#NODE_IP}"}'
                    - value
                    - ''
            - uuid: f4ddf9f642944934b443ea120e990192
              name: 'Mgr {#NODE_IP}: Memory usage ratio'
              type: CALCULATED
              key: 'nsxt.mgr.memory_usage_ratio[{#NODE_IP}]'
              delay: 1m
              value_type: FLOAT
              params: 'last(//nsxt.mgr.memory_use[{#NODE_IP}])/last(//nsxt.mgr.memory_total[{#NODE_IP}])'
              trigger_prototypes:
                - uuid: 02e9a415c7c6439795ce6820e3218de0
                  expression: 'last(/NSX-T by Prometheus exporter/nsxt.mgr.memory_usage_ratio[{#NODE_IP}])>{$NSXT.MEM.WARN}'
                  name: 'NSX-T: Manager {#NODE_IP} memory pressure high ({ITEM.LASTVALUE})'
                  priority: WARNING
            - uuid: eac7fcd910be4483a6da8676bb4becc6
              name: 'Mgr {#NODE_IP}: Connectivity'
              type: DEPENDENT
              key: 'nsxt.mgr.connectivity[{#NODE_IP}]'
              master_item:
                key: nsxt.get
              delay: '0'
              value_type: FLOAT
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'nsxv3_management_node_connectivity{nsxv3_node_ip="{#NODE_IP}"}'
                    - value
                    - ''
              trigger_prototypes:
                - uuid: a73c7f05b2304345b2634e5fba4fa602
                  expression: 'last(/NSX-T by Prometheus exporter/nsxt.mgr.connectivity[{#NODE_IP}])<1'
                  name: 'NSX-T: Manager {#NODE_IP} is not CONNECTED'
                  priority: HIGH

        # ─── Transport nodes ──────────────────────────────────────────────
        - uuid: 26d980960c624cd1ab2f222ab00b6262
          name: 'NSX-T: Transport nodes discovery'
          type: DEPENDENT
          key: nsxt.transport_nodes.discovery
          master_item:
            key: nsxt.get
          delay: '0'
          lifetime: 7d
          preprocessing:
            - type: PROMETHEUS_TO_JSON
              parameters:
                - 'nsxv3_transport_node_state'
          lld_macro_paths:
            - lld_macro: '{#NODE_ID}'
              path: '$.labels.nsxv3_node_id'
          item_prototypes:
            - uuid: 7063f818fca34298a86e7377443414d1
              name: 'TN {#NODE_ID}: State'
              type: DEPENDENT
              key: 'nsxt.transport_node.state[{#NODE_ID}]'
              master_item:
                key: nsxt.get
              delay: '0'
              value_type: FLOAT
              description: 'SUCCESS=1, IN_PROGRESS=0, PENDING=-1, FAILED=-2, PARTIAL_SUCCESS=-3, ORPHANED=-4, UNKNOWN=-5'
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'nsxv3_transport_node_state{nsxv3_node_id="{#NODE_ID}"}'
                    - value
                    - ''
              trigger_prototypes:
                - uuid: 3741b8c5f6284528b134acd4518b7da9
                  expression: 'last(/NSX-T by Prometheus exporter/nsxt.transport_node.state[{#NODE_ID}])<1'
                  name: 'NSX-T: Transport node {#NODE_ID} is not healthy ({ITEM.LASTVALUE})'
                  priority: HIGH
                  description: 'Operational scenario #3: transport node disconnected.'
            - uuid: f6ceee252971474986d6b3d5fe0f078b
              name: 'TN {#NODE_ID}: Deployment state'
              type: DEPENDENT
              key: 'nsxt.transport_node.deployment_state[{#NODE_ID}]'
              master_item:
                key: nsxt.get
              delay: '0'
              value_type: FLOAT
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'nsxv3_transport_node_deployment_state{nsxv3_node_id="{#NODE_ID}"}'
                    - value
                    - ''

        # ─── Edge nodes (CPU/mem/disk) ────────────────────────────────────
        - uuid: cf1bf4fbec32417d9124a52f3a09136f
          name: 'NSX-T: Edge nodes discovery'
          type: DEPENDENT
          key: nsxt.edge_nodes.discovery
          master_item:
            key: nsxt.get
          delay: '0'
          lifetime: 7d
          preprocessing:
            - type: PROMETHEUS_TO_JSON
              parameters:
                - 'nsxv3_edge_node_cpu_cores'
          lld_macro_paths:
            - lld_macro: '{#NODE_ID}'
              path: '$.labels.nsxv3_node_id'
            - lld_macro: '{#NODE_NAME}'
              path: '$.labels.display_name'
          item_prototypes:
            - uuid: 7a8245fcd36f43ae962d334aa16a14b5
              name: 'Edge {#NODE_NAME}: CPU usage ratio'
              type: DEPENDENT
              key: 'nsxt.edge.cpu_usage_ratio[{#NODE_ID}]'
              master_item:
                key: nsxt.get
              delay: '0'
              value_type: FLOAT
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'nsxv3_edge_node_cpu_usage_ratio{nsxv3_node_id="{#NODE_ID}"}'
                    - value
                    - ''
              trigger_prototypes:
                - uuid: 2ede2f0a076947f7b1ebfdadb31f0803
                  expression: 'last(/NSX-T by Prometheus exporter/nsxt.edge.cpu_usage_ratio[{#NODE_ID}])>{$NSXT.CPU.WARN}'
                  name: 'NSX-T: Edge {#NODE_NAME} CPU pressure high ({ITEM.LASTVALUE})'
                  priority: WARNING
                  description: 'Operational scenario #4: high CPU on edge.'
            - uuid: 84c37d7f2176414080a5cca4c1a7722f
              name: 'Edge {#NODE_NAME}: Memory usage ratio'
              type: DEPENDENT
              key: 'nsxt.edge.memory_usage_ratio[{#NODE_ID}]'
              master_item:
                key: nsxt.get
              delay: '0'
              value_type: FLOAT
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'nsxv3_edge_node_memory_usage_ratio{nsxv3_node_id="{#NODE_ID}"}'
                    - value
                    - ''
              trigger_prototypes:
                - uuid: 3e0559dd66014901b88d1736efe1afad
                  expression: 'last(/NSX-T by Prometheus exporter/nsxt.edge.memory_usage_ratio[{#NODE_ID}])>{$NSXT.MEM.WARN}'
                  name: 'NSX-T: Edge {#NODE_NAME} memory pressure high ({ITEM.LASTVALUE})'
                  priority: WARNING
            - uuid: e39c173acb534c87b58c995d0ba03f8a
              name: 'Edge {#NODE_NAME}: Memory used'
              type: DEPENDENT
              key: 'nsxt.edge.memory_use[{#NODE_ID}]'
              master_item:
                key: nsxt.get
              delay: '0'
              value_type: FLOAT
              units: B
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'nsxv3_edge_node_memory_use{nsxv3_node_id="{#NODE_ID}"}'
                    - value
                    - ''
            - uuid: 0ca4109db3194857aaa653a9fc9616e3
              name: 'Edge {#NODE_NAME}: CPU cores'
              type: DEPENDENT
              key: 'nsxt.edge.cpu_cores[{#NODE_ID}]'
              master_item:
                key: nsxt.get
              delay: '0'
              value_type: FLOAT
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'nsxv3_edge_node_cpu_cores{nsxv3_node_id="{#NODE_ID}"}'
                    - value
                    - ''
              trigger_prototypes:
                - uuid: e78bdcfb97c54ccab9d853900f02117a
                  expression: 'nodata(/NSX-T by Prometheus exporter/nsxt.edge.cpu_cores[{#NODE_ID}],5m)=1'
                  name: 'NSX-T: Edge {#NODE_NAME} has no status (likely down)'
                  priority: HIGH
                  description: 'Operational scenario #2: edge node down. Triggered when no metrics arrive for 5m.'
            - uuid: 81d0d701d8ff41a7b52bd17d34ed982b
              name: 'Edge {#NODE_NAME}: Uptime'
              type: DEPENDENT
              key: 'nsxt.edge.uptime[{#NODE_ID}]'
              master_item:
                key: nsxt.get
              delay: '0'
              value_type: FLOAT
              units: s
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'nsxv3_edge_node_uptime_seconds{nsxv3_node_id="{#NODE_ID}"}'
                    - value
                    - ''

        # ─── Edge filesystems ─────────────────────────────────────────────
        - uuid: 8fa1a95b7e8749d582d513a928aa848b
          name: 'NSX-T: Edge filesystems discovery'
          type: DEPENDENT
          key: nsxt.edge_filesystems.discovery
          master_item:
            key: nsxt.get
          delay: '0'
          lifetime: 7d
          preprocessing:
            - type: PROMETHEUS_TO_JSON
              parameters:
                - 'nsxv3_edge_node_storage_usage_ratio'
          lld_macro_paths:
            - lld_macro: '{#NODE_ID}'
              path: '$.labels.nsxv3_node_id'
            - lld_macro: '{#NODE_NAME}'
              path: '$.labels.display_name'
            - lld_macro: '{#FS}'
              path: '$.labels.filesystem'
          item_prototypes:
            - uuid: 27faa6e2c8054d6fb99b28304cce841c
              name: 'Edge {#NODE_NAME}: FS {#FS} usage ratio'
              type: DEPENDENT
              key: 'nsxt.edge.fs.usage_ratio[{#NODE_ID},{#FS}]'
              master_item:
                key: nsxt.get
              delay: '0'
              value_type: FLOAT
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'nsxv3_edge_node_storage_usage_ratio{nsxv3_node_id="{#NODE_ID}",filesystem="{#FS}"}'
                    - value
                    - ''
              trigger_prototypes:
                - uuid: 3a5465c8705343059d25eb6e81859d71
                  expression: 'last(/NSX-T by Prometheus exporter/nsxt.edge.fs.usage_ratio[{#NODE_ID},{#FS}])>{$NSXT.DISK.WARN}'
                  name: 'NSX-T: Edge {#NODE_NAME} FS {#FS} is filling up ({ITEM.LASTVALUE})'
                  priority: WARNING

