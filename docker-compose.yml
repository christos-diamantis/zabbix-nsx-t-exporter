services:
  nsx-t-exporter:
    image: zabbix-nsx-t-exporter:latest
    build: .
    container_name: nsx-t-exporter
    restart: unless-stopped
    ports:
      - "9999:9999"
    environment:
      # Required
      NSXV3_LOGIN_HOST: nsxt-mgr.example.com
      NSXV3_LOGIN_USER: zabbix-readonly
      NSXV3_LOGIN_PASSWORD: changeme

      # Optional - tune to your environment
      NSXV3_LOGIN_PORT: "443"
      NSXV3_SUPPRESS_SSL_WARNINGS: "false"
      NSXV3_REQUESTS_PER_SECOND: "10"
      NSXV3_REQUEST_TIMEOUT_SECONDS: "30"
      SCRAP_PORT: "9999"
      SCRAP_SCHEDULE_SECONDS: "60"

      # Extended collectors — set to "false" to skip in large fabrics
      NSXV3_INCLUDE_BGP: "true"
      NSXV3_INCLUDE_LB: "true"
      NSXV3_INCLUDE_TUNNELS: "true"
      NSXV3_INCLUDE_CERTIFICATES: "true"
      NSXV3_INCLUDE_BACKUP: "true"
      NSXV3_INCLUDE_IP_POOLS: "true"
      NSXV3_INCLUDE_EDGE_STATS: "true"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9999/"]
      interval: 30s
      timeout: 5s
      retries: 3
